project:
  title: "Health Monitor Alarm Decoder"
  author: "ECE 429 Student"
  discord: ""
  description: "A Tiny Tapeout health monitor alarm decoder that maps switch-coded health readings to values and alarm outputs."
  language: "Verilog"
  clock_hz: 0
  tiles: "1x1"
  top_module: "tt_um_health_monitor_decoder"
  source_files:
    - "project.v"

pinout:
  ui[0]: "heart_rate_sw[0]"
  ui[1]: "heart_rate_sw[1]"
  ui[2]: "heart_rate_sw[2]"
  ui[3]: "oxygen_rate_sw[0]"
  ui[4]: "oxygen_rate_sw[1]"
  ui[5]: "oxygen_rate_sw[2]"
  ui[6]: "display_select[0]"
  ui[7]: "display_select[1]"

  uo[0]: "selected_value[0]"
  uo[1]: "selected_value[1]"
  uo[2]: "selected_value[2]"
  uo[3]: "selected_value[3]"
  uo[4]: "selected_value[4]"
  uo[5]: "selected_value[5]"
  uo[6]: "selected_value[6]"
  uo[7]: "selected_value[7]"

  uio[0]: "blood_pressure_sw[0]"
  uio[1]: "blood_pressure_sw[1]"
  uio[2]: "blood_pressure_sw[2]"
  uio[3]: "unused input"
  uio[4]: "heart rate alarm"
  uio[5]: "oxygen alarm"
  uio[6]: "blood pressure alarm"
  uio[7]: "any alarm"

yaml_version: 6
